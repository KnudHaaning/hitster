<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0a1628" />
  <title>Hitster</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Game Screen -->
  <div id="screen-game" class="screen">
    <header>
      <span class="logo">HITSTER</span>
      <span id="counter" class="counter">0 / 0</span>
    </header>

    <main>
      <div id="reveal-area" class="reveal-area hidden">
        <div id="year-badge" class="year-badge"></div>
        <div id="song-title" class="song-title"></div>
        <div id="song-artist" class="song-artist"></div>
      </div>
      <div id="idle-icon" class="idle-icon">🎵</div>
    </main>

    <footer>
      <button id="btn-play" class="btn btn-primary">▶ Play Song</button>
      <button id="btn-reveal" class="btn btn-secondary" disabled>👁 Reveal Song</button>
    </footer>
  </div>

  <!-- Session Complete Screen -->
  <div id="screen-complete" class="screen hidden">
    <main class="complete-content">
      <div class="complete-icon">🎉</div>
      <h1>All songs played!</h1>
      <p>Great game. Ready for another round?</p>
      <button id="btn-new-session" class="btn btn-primary">▶ Start New Session</button>
    </main>
  </div>

  <script src="tracks.js"></script>
  <script src="app.js"></script>
</body>
</html>
